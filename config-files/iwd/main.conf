[Rank]
# Prefer 5GHz over 2.4GHz by downgrading 2.4GHz rank score.
# iwd already scores 5GHz higher due to throughput; this makes the
# preference explicit so weak 5GHz signals still win over 2.4GHz.
# Range: 0.0 (disable band) to any positive float (default: 1.0)
BandModifier2_4GHz=0.4
BandModifier5GHz=1.0
