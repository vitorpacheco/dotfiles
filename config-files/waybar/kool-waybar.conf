# Kool Waybar Configuration
# For use with JaKooLit Hyprland dotfiles on Ubuntu 25.10+
# This file stores waybar layout and style preferences for Kool installations
#
# To use this configuration:
# 1. Set your preferred layout and style below
# 2. Run: ./install --kool-overrides
# 3. The install script will create the appropriate symlinks
#
# Available configs: ~/.config/waybar/configs/ (47 layouts available)
# Available styles: ~/.config/waybar/style/ (55 styles available)
#
# Use Kool's built-in selectors to see all options:
# - SUPER+CTRL+B: Waybar styles menu
# - SUPER+ALT+B: Waybar layout menu
#
# Current selection:
WAYBAR_CONFIG="[TOP] Default"
WAYBAR_STYLE="[Dark] Wallust Obsidian Edge.css"

# vi: ft=bash
