# Kool Hyprland Dotfiles Overrides
# For use with JaKooLit Hyprland dotfiles on Ubuntu 25.10+
# Source this file from hyprland.conf AFTER the default configs
# 
# This file provides Omarchy-style keybinds and Nord-themed look/feel
# while maintaining compatibility with Kool's infrastructure

# ============================================
# DEFAULT VARIABLES (Override Kool defaults)
# ============================================
$editor = nvim
$term = ghostty
$files = nautilus

# ============================================
# SECTION 1: KEYBINDS (Omarchy-style with Kool adaptations)
# ============================================

# Note: Using $mainMod from Kool's variable definitions
# Kool defines: $mainMod = SUPER

# --- Core Window Management ---

# Terminal - Override Kool's kitty with ghostty
unbind = $mainMod, Return
unbind = $mainMod, Enter
bindd = $mainMod, Return, Terminal, exec, $term

# File Manager - Using nautilus (Omarchy-style, different from Kool's thunar)
unbind = $mainMod, E
bindd = $mainMod, E, File manager, exec, $files

# Editor - Opens nvim in terminal (Omarchy-style)
bindd = $mainMod SHIFT, N, Editor, exec, $term -e $editor

# Close window - Omarchy uses SUPER+W (Kool uses SUPER+Q)
unbind = $mainMod, Q
bindd = $mainMod, W, Close window, killactive,

# Toggle floating - moved from SUPER+SPACE to SUPER+T
unbind = $mainMod, SPACE
unbind = $mainMod, T
bindd = $mainMod, T, Toggle floating, togglefloating,

# Toggle split - moved from SUPER+SHIFT+I to SUPER+J
unbind = $mainMod, J
unbind = $mainMod SHIFT, I
bindd = $mainMod, J, Toggle split, togglesplit

# Fullscreen modes
unbind = $mainMod, F
unbind = $mainMod SHIFT, F
unbind = $mainMod CTRL, F
bindd = $mainMod, F, Fullscreen, fullscreen, 0
bindd = $mainMod SHIFT, F, Fake fullscreen, fullscreen, 1
bindd = $mainMod CTRL, F, Maximize, fullscreenstate, 0 2

# App launcher - Using rofi (Kool's default) instead of walker
# Kool uses: rofi -show drun -modi drun,filebrowser,run,window
bindd = $mainMod, SPACE, Launch apps, exec, rofi -show drun -modi drun,filebrowser,run,window

# --- Web Apps & Tools ---

# WhatsApp Web - the only web app you wanted to keep
bindd = $mainMod SHIFT, A, WhatsApp, exec, chromium --app=https://web.whatsapp.com/

# Password Manager (Bitwarden)
bindd = $mainMod SHIFT, SLASH, Passwords, exec, bitwarden

# --- Window Focus & Movement ---

# Move focus with arrow keys (rebinding with descriptions)
unbind = $mainMod, left
unbind = $mainMod, right
unbind = $mainMod, up
unbind = $mainMod, down

bindd = $mainMod, LEFT, Focus left, movefocus, l
bindd = $mainMod, RIGHT, Focus right, movefocus, r
bindd = $mainMod, UP, Focus up, movefocus, u
bindd = $mainMod, DOWN, Focus down, movefocus, d

# Swap windows with SUPER+SHIFT+arrow keys
bindd = $mainMod SHIFT, LEFT, Swap left, swapwindow, l
bindd = $mainMod SHIFT, RIGHT, Swap right, swapwindow, r
bindd = $mainMod SHIFT, UP, Swap up, swapwindow, u
bindd = $mainMod SHIFT, DOWN, Swap down, swapwindow, d

# Move windows with SUPER+CTRL+arrow keys (Kool default)
bindd = $mainMod CTRL, LEFT, Move left, movewindow, l
bindd = $mainMod CTRL, RIGHT, Move right, movewindow, r
bindd = $mainMod CTRL, UP, Move up, movewindow, u
bindd = $mainMod CTRL, DOWN, Move down, movewindow, d

# --- Workspace Management ---

# Unbind existing workspace keys to rebind with descriptions
unbind = $mainMod, 1
unbind = $mainMod, 2
unbind = $mainMod, 3
unbind = $mainMod, 4
unbind = $mainMod, 5
unbind = $mainMod, 6
unbind = $mainMod, 7
unbind = $mainMod, 8
unbind = $mainMod, 9
unbind = $mainMod, 0

# Switch workspaces with descriptions
bindd = $mainMod, 1, Workspace 1, workspace, 1
bindd = $mainMod, 2, Workspace 2, workspace, 2
bindd = $mainMod, 3, Workspace 3, workspace, 3
bindd = $mainMod, 4, Workspace 4, workspace, 4
bindd = $mainMod, 5, Workspace 5, workspace, 5
bindd = $mainMod, 6, Workspace 6, workspace, 6
bindd = $mainMod, 7, Workspace 7, workspace, 7
bindd = $mainMod, 8, Workspace 8, workspace, 8
bindd = $mainMod, 9, Workspace 9, workspace, 9
bindd = $mainMod, 0, Workspace 10, workspace, 10

# Move window to workspace silently (Omarchy-style)
unbind = $mainMod SHIFT, 1
unbind = $mainMod SHIFT, 2
unbind = $mainMod SHIFT, 3
unbind = $mainMod SHIFT, 4
unbind = $mainMod SHIFT, 5
unbind = $mainMod SHIFT, 6
unbind = $mainMod SHIFT, 7
unbind = $mainMod SHIFT, 8
unbind = $mainMod SHIFT, 9
unbind = $mainMod SHIFT, 0

bindd = $mainMod SHIFT, 1, Move to ws 1, movetoworkspacesilent, 1
bindd = $mainMod SHIFT, 2, Move to ws 2, movetoworkspacesilent, 2
bindd = $mainMod SHIFT, 3, Move to ws 3, movetoworkspacesilent, 3
bindd = $mainMod SHIFT, 4, Move to ws 4, movetoworkspacesilent, 4
bindd = $mainMod SHIFT, 5, Move to ws 5, movetoworkspacesilent, 5
bindd = $mainMod SHIFT, 6, Move to ws 6, movetoworkspacesilent, 6
bindd = $mainMod SHIFT, 7, Move to ws 7, movetoworkspacesilent, 7
bindd = $mainMod SHIFT, 8, Move to ws 8, movetoworkspacesilent, 8
bindd = $mainMod SHIFT, 9, Move to ws 9, movetoworkspacesilent, 9
bindd = $mainMod SHIFT, 0, Move to ws 10, movetoworkspacesilent, 10

# Workspace cycling
unbind = $mainMod, TAB
unbind = $mainMod SHIFT, TAB
bindd = $mainMod, TAB, Next workspace, workspace, e+1
bindd = $mainMod SHIFT, TAB, Previous workspace, workspace, e-1

# --- Mouse Bindings ---

unbindm = $mainMod, mouse:272
unbindm = $mainMod, mouse:273
bindmd = $mainMod, mouse:272, Move window, movewindow
bindmd = $mainMod, mouse:273, Resize window, resizewindow

# --- Groups ---

bindd = $mainMod, G, Toggle group, togglegroup
bindd = $mainMod ALT, G, Move out of group, moveoutofgroup

# Navigate within a group
unbind = $mainMod, Tab
unbind = $mainMod SHIFT, Tab
bindd = $mainMod, Tab, Next in group, changegroupactive, f
bindd = $mainMod SHIFT, Tab, Previous in group, changegroupactive, b

# ============================================
# SECTION 2: LOOK AND FEEL (Omarchy structure + Nord colors)
# ============================================

# Nord Theme Color Definitions
# Polar Night (dark backgrounds)
$nord0 = rgba(46, 52, 64, 1.0)     # 2E3440
$nord1 = rgba(59, 66, 82, 1.0)     # 3B4252
$nord2 = rgba(67, 76, 94, 1.0)     # 434C5E
$nord3 = rgba(76, 86, 106, 1.0)   # 4C566A

# Snow Storm (light text)
$nord4 = rgba(216, 222, 233, 1.0)   # D8DEE9
$nord5 = rgba(229, 233, 240, 1.0)   # E5E9F0
$nord6 = rgba(236, 239, 244, 1.0)   # ECEFF4

# Frost (blues - primary accent)
$nord7 = rgba(143, 188, 187, 1.0)   # 8FBCBB
$nord8 = rgba(136, 192, 208, 1.0)   # 88C0D0
$nord9 = rgba(129, 161, 193, 1.0)   # 81A1C1
$nord10 = rgba(94, 129, 172, 1.0)   # 5E81AC

# Aurora (accents)
$nord11 = rgba(191, 97, 106, 1.0)   # BF616A (red)
$nord12 = rgba(208, 135, 112, 1.0)  # D08770 (orange)
$nord13 = rgba(235, 203, 139, 1.0)  # EBCB8B (yellow)
$nord14 = rgba(163, 190, 140, 1.0)  # A3BE8C (green)
$nord15 = rgba(180, 142, 173, 1.0)   # B48EAD (purple)

# Border colors using Frost gradient
$activeBorderColor = rgba(136c0d0ee) rgba(81a1c1ee) 45deg
$inactiveBorderColor = rgba(434c5eaa)

# --- General Settings ---
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = $activeBorderColor
    col.inactive_border = $inactiveBorderColor
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

# --- Decoration Settings ---
decoration {
    rounding = 0
    
    shadow {
        enabled = true
        range = 2
        render_power = 3
        color = rgba(1a1a1aee)
    }
    
    blur {
        enabled = true
        size = 2
        passes = 2
        special = true
        brightness = 0.60
        contrast = 0.75
    }
}

# --- Group Settings ---
group {
    col.border_active = $activeBorderColor
    col.border_inactive = $inactiveBorderColor
    col.border_locked_active = -1
    col.border_locked_inactive = -1
    
    groupbar {
        font_size = 12
        font_family = monospace
        font_weight_active = ultraheavy
        font_weight_inactive = normal
        indicator_height = 0
        indicator_gap = 5
        height = 22
        gaps_in = 5
        gaps_out = 0
        text_color = $nord6
        text_color_inactive = rgba(236, 239, 244, 0.6)
        col.active = rgba(0, 0, 0, 0.25)
        col.inactive = rgba(0, 0, 0, 0.13)
        gradients = true
        gradient_rounding = 0
        gradient_round_only_edges = false
    }
}

# --- Animations ---
animations {
    enabled = yes, please :)
    
    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1
    
    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 0, 0, ease
}

# --- Dwindle Layout ---
dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 2  # Always split on the right
    special_scale_factor = 0.8
}

# --- Master Layout ---
master {
    new_status = master
    new_on_top = 1
    mfact = 0.5
}

# ============================================
# SECTION 3: INPUT SETTINGS (Dual Layout)
# ============================================

input {
    # Dual keyboard layout: default (us) + Portuguese (Brazil)
    kb_layout = us,br
    kb_options = compose:caps,cedilla,grp:alts_toggle
    
    repeat_rate = 40
    repeat_delay = 600
    
    numlock_by_default = true
    sensitivity = 0
    
    touchpad {
        disable_while_typing = true
        natural_scroll = true
        clickfinger_behavior = false
        middle_button_emulation = false
        tap-to-click = true
        drag_lock = false
    }
}

# ============================================
# SECTION 4: MISC SETTINGS
# ============================================

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    focus_on_activate = true
    anr_missed_pings = 3
    on_focus_under_fullscreen = 1
    
    # Wake up with key/mouse activity
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}

cursor {
    hide_on_key_press = true
    warp_on_change_workspace = 1
    sync_gsettings_theme = true
    no_hardware_cursors = 2
    enable_hyprcursor = true
}

binds {
    hide_special_on_workspace_change = true
    workspace_back_and_forth = true
    allow_workspace_cycles = true
}

# ============================================
# SECTION 5: WINDOW RULES
# ============================================

# MEGAsync floating configuration
windowrule = float on, match:class ^(nz\.co\.mega\.megasync)$
windowrule = size 500 600, match:class ^(nz\.co\.mega\.megasync)$
windowrule = move 2350 85, match:class ^(nz\.co\.mega\.megasync)$
windowrule = pin on, match:class ^(nz\.co\.mega\.megasync)$
windowrule = stay_focused on, match:class ^(nz\.co\.mega\.megasync)$

# vi: ft=hypr
